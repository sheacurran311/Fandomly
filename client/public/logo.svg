<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e10698"/>
      <stop offset="100%" style="stop-color:#14feee"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e10698"/>
      <stop offset="100%" style="stop-color:#14feee"/>
    </linearGradient>
  </defs>
  
  <!-- Logo icon -->
  <circle cx="30" cy="30" r="20" fill="url(#logoGradient)"/>
  
  <!-- Fan icon - stylized heart with connections -->
  <path d="M25 22c-2-3 2-7 5-4 3-3 7 1 5 4-2 4-5 7-5 7s-3-3-5-7z" fill="white"/>
  <circle cx="20" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="40" cy="35" r="2" fill="white" opacity="0.8"/>
  <line x1="22" y1="35" x2="28" y2="30" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="35" x2="32" y2="30" stroke="white" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Brand text -->
  <text x="65" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#textGradient)">Fandomly</text>
  <text x="65" y="40" font-family="Arial, sans-serif" font-size="10" fill="#14feee" opacity="0.9">.ai</text>
  
  <!-- Tagline -->
  <text x="65" y="52" font-family="Arial, sans-serif" font-size="8" fill="#888">Loyalty Programs for Creators</text>
</svg>