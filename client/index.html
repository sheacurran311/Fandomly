<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Fandomly - AI-Powered Loyalty Platform for Creators</title>
    <meta name="description" content="Build AI-powered loyalty programs that reward your fans for engagement. Integrate social media, offer exclusive perks, and grow your fandom with smart Web3 rewards." />
    <meta property="og:title" content="Fandomly - AI-Powered Loyalty Platform for Creators" />
    <meta property="og:description" content="Reward fans for real engagement. Cross-platform loyalty for creators." />
    <meta property="og:image" content="/fandomly-logo-with-text.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <!-- Allow Facebook SDK and Dynamic SDK -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:; frame-src 'self' https:; img-src 'self' data: https: blob:; connect-src 'self' https: wss: data:;">
  </head>
  <body>
    <div id="fb-root"></div>
    <script>
      console.log('[FB index.html] Script starting...');
      // Optional globals can be set before this script:
      // window.FACEBOOK_FAN_APP_ID, window.FACEBOOK_CREATOR_APP_ID, window.FACEBOOK_APP_ID, window.FACEBOOK_API_VERSION
      (function(){
        var FAN_APP_ID = window.FACEBOOK_FAN_APP_ID || '4233782626946744';
        var CREATOR_APP_ID = window.FACEBOOK_CREATOR_APP_ID || '1665384740795979';
        var API_VERSION = window.FACEBOOK_API_VERSION || 'v24.0';
        // Choose initial App ID based on route context: use Creator app on creator routes, else Fan app
        var PATHNAME = (window.location && window.location.pathname) || '/';
        var IS_CREATOR_CONTEXT = PATHNAME.startsWith('/creator') || PATHNAME === '/profile';
        var INITIAL_APP_ID = window.FACEBOOK_APP_ID || (IS_CREATOR_CONTEXT ? CREATOR_APP_ID : FAN_APP_ID);
        window.__FB_DEFAULTS__ = { FAN_APP_ID: FAN_APP_ID, CREATOR_APP_ID: CREATOR_APP_ID, API_VERSION: API_VERSION };

        window.fbAsyncInit = function() {
          console.log('[FB index.html] fbAsyncInit called, FB object:', typeof FB);
          try {
            FB.init({
              appId      : INITIAL_APP_ID,
              cookie     : true,
              xfbml      : true,
              version    : API_VERSION
            });
            window.__FB_CURRENT_APP_ID__ = INITIAL_APP_ID;
            console.log('[FB index.html] FB.init completed with App ID:', INITIAL_APP_ID);
            FB.AppEvents.logPageView();
          } catch (e) {
            console.error('[FB index.html] FB.init failed:', e);
          }

          // Expose a helper to reinitialize with a different appId at runtime
          window.reinitializeFacebookApp = function(appId) {
            try {
              if (!appId) appId = INITIAL_APP_ID;
              FB.init({ appId: appId, cookie: true, xfbml: true, version: API_VERSION });
              window.__FB_CURRENT_APP_ID__ = appId;
              return true;
            } catch (e) {
              console.error('FB reinit failed', e);
              return false;
            }
          };

          // Global function for Facebook login button callback
          window.checkLoginState = function() {
            FB.getLoginStatus(function(response) {
              console.log('Facebook login status:', response);
              if (window.handleFacebookLoginStatus) {
                window.handleFacebookLoginStatus(response);
              }
            });
          }
        };
      })();

      (function(d, s, id){
         var js, fjs = d.getElementsByTagName(s)[0];
         if (d.getElementById(id)) {
           console.log('[FB index.html] Script already exists, checking if FB loaded:', typeof window.FB);
           return;
         }
         js = d.createElement(s); js.id = id;
         js.src = "https://connect.facebook.net/en_US/sdk.js";
         js.async = true;
         js.defer = true;
         js.crossOrigin = "anonymous";
         js.onload = function() { 
           console.log('[FB index.html] SDK script loaded, FB:', typeof window.FB); 
         };
         js.onerror = function(e) { 
           console.error('[FB index.html] SDK script FAILED to load:', e); 
         };
         console.log('[FB index.html] Inserting FB SDK script...');
         if (fjs && fjs.parentNode) {
           fjs.parentNode.insertBefore(js, fjs);
         } else {
           d.head.appendChild(js);
         }
       }(document, 'script', 'facebook-jssdk'));
    </script>
    
    <div id="root"></div>
    <!-- Buffer polyfill MUST load before any module code. Particle SDK's
         crypto chain (ripemd160 → hash-base → readable-stream) calls
         Buffer.slice() at import time. Vite hoists ES imports above runtime
         code in main.tsx, so setting globalThis.Buffer there is too late.
         This classic script runs synchronously before module evaluation. -->
    <script>
      (function() {
        if (typeof globalThis.Buffer === 'undefined') {
          try {
            var bufferModule = require('buffer');
            globalThis.Buffer = bufferModule.Buffer;
          } catch(e) {
            // In Vite dev, require isn't available — the nodePolyfills plugin
            // injects Buffer via import, but we need a fallback shim for the
            // brief window before Vite's polyfill runs.
            // Define a minimal Buffer.from/slice/alloc that covers hash-base usage.
            var B = function(arg, enc) {
              if (typeof arg === 'number') return new Uint8Array(arg);
              if (typeof arg === 'string') {
                var e = new TextEncoder();
                return e.encode(arg);
              }
              if (arg instanceof Uint8Array) return arg;
              return new Uint8Array(arg || 0);
            };
            B.from = function(a, e) { return new B(a, e); };
            B.alloc = function(n) { return new Uint8Array(n); };
            B.allocUnsafe = B.alloc;
            B.isBuffer = function(b) { return b instanceof Uint8Array; };
            B.concat = function(list, len) {
              var total = len || list.reduce(function(s, b) { return s + b.length; }, 0);
              var result = new Uint8Array(total);
              var offset = 0;
              for (var i = 0; i < list.length; i++) {
                result.set(list[i], offset);
                offset += list[i].length;
              }
              return result;
            };
            B.prototype = Object.create(Uint8Array.prototype);
            globalThis.Buffer = B;
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
